<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Locator | FreshStart</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&libraries=places,directions"></script>
</head>
<body>

    <nav><h1>FreshStart</h1></nav>

    <main class="container">
        <header>
            <h2>Office Locator</h2>
            <p>Find the nearest government office for your selected service.</p>
        </header>

        <section class="controls">
            <input type="text" id="addressInput" placeholder="Enter your current address (e.g., Imus, Cavite)">
            <select id="serviceSelect">
                <option value="">Select a Service</option>
                <option value="Barangay Clearance">Barangay Clearance</option>
                <option value="PhilHealth">PhilHealth</option>
                <option value="NBI Clearance">NBI Clearance</option>
                </select>
            <button onclick="findNearestOffice()">Find Nearest Office</button>
        </section>

        <div id="map"></div>
        <div id="error-msg" class="error"></div>

        <section id="result-card" class="card hidden"></section>
        <section id="nearby-list"></section>
    </main>

    <script src="script.js"></script>
</body>
</html>
